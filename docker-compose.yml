name: massar_platform

x-frontend-build: &frontend-build
  context: ./frontend
  dockerfile: Dockerfile
  args:
    NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5245/api}
    NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5245}

x-frontend-environment: &frontend-environment
  NODE_ENV: production
  TZ: Africa/Cairo
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5245/api}
  NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5245}
  INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:5245/api}
  INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:5245}
  API_CALLBACK_SECRET: ${API_CALLBACK_SECRET:?API_CALLBACK_SECRET is required}
  AI_CALLBACK_SECRET: ${AI_CALLBACK_SECRET:?AI_CALLBACK_SECRET is required}
  WORKER_ADMIN_TOKEN: ${WORKER_ADMIN_TOKEN:?WORKER_ADMIN_TOKEN is required}
  WORKER_URL: ${WORKER_URL:-http://worker:3001}
  LANDING_PUBLIC_ORIGIN: ${LANDING_PUBLIC_ORIGIN:-http://localhost:8738}
  STUDENT_PUBLIC_ORIGIN: ${STUDENT_PUBLIC_ORIGIN:-http://localhost:8739}
  ADMIN_PUBLIC_ORIGIN: ${ADMIN_PUBLIC_ORIGIN:-http://localhost:8740}
  TEACHER_PUBLIC_ORIGIN: ${TEACHER_PUBLIC_ORIGIN:-http://localhost:8741}
  ASSISTANT_PUBLIC_ORIGIN: ${ASSISTANT_PUBLIC_ORIGIN:-http://localhost:8742}
  NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN:-massar-academy.net}
  BUNNY_STREAM_LIBRARY_ID: ${BUNNY_STREAM_LIBRARY_ID:-}



services:

  # Database
  db:
    image: postgres:16.2-alpine
    container_name: massar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-massar_platform}
      TZ: Africa/Cairo
    ports:
      - "127.0.0.1:${MASSAR_POSTGRES_PORT:-5435}:5432"
    volumes:
      - masar_pgdata:/var/lib/postgresql/data
    networks:
      - massar_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Cache / Queue Broker
  redis:
    image: redis:7.2.4-alpine
    container_name: massar_redis
    ports:
      - "127.0.0.1:${MASSAR_REDIS_PORT:-6382}:6379"
    volumes:
      - masar_redisdata:/data
    networks:
      - massar_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Backend API (.NET 9 ASP.NET Core)
  backend:
    image: massar_backend:local
    container_name: massar_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:5245}
      TZ: Africa/Cairo
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-db};Database=${POSTGRES_DB:-massar_platform};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis: "${REDIS_HOST:-redis}:${REDIS_PORT:-6379},abortConnect=false"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-MassarPlatformAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-MassarPlatformClients}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRY_MINUTES:-60}
      JwtSettings__RefreshExpirationDays: ${JWT_REFRESH_DAYS:-30}
      DeviceLimits__MaxDevicesPerStudent: ${MAX_DEVICES_PER_STUDENT:-2}
      EvolutionApi__BaseUrl: ${EVOLUTION_API_BASE_URL:-}
      EvolutionApi__ApiKey: ${EVOLUTION_API_KEY:-}
      EvolutionApi__InstanceName: ${EVOLUTION_API_INSTANCE:-Massar}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:8738,http://localhost:8739,http://localhost:8740,http://localhost:8741,http://localhost:8742,https://massar-academy.net,https://www.massar-academy.net,https://app.massar-academy.net,https://student.massar-academy.net,https://staff.massar-academy.net,https://super.massar-academy.net,https://teacher.massar-academy.net,https://admin.massar-academy.net}
      CookieSettings__Domain: ${COOKIE_DOMAIN:-}
      API_CALLBACK_SECRET: ${API_CALLBACK_SECRET:?API_CALLBACK_SECRET is required}
      AI_CALLBACK_SECRET: ${AI_CALLBACK_SECRET:?AI_CALLBACK_SECRET is required}
      ParentReports__SigningSecret: ${PARENT_REPORT_SIGNING_SECRET:?PARENT_REPORT_SIGNING_SECRET is required}
      BunnyStream__LibraryId: ${BUNNY_STREAM_LIBRARY_ID:-}
      BunnyStream__ApiKey: ${BUNNY_STREAM_API_KEY:-}
      BunnyStream__TusUploadExpiryMinutes: ${BUNNY_STREAM_TUS_UPLOAD_EXPIRY_MINUTES:-180}
    ports:
      - "127.0.0.1:${MASAR_BACKEND_PORT:-${MASSAR_BACKEND_PORT:-5245}}:5245"
    volumes:
      - massar_assets:/app/wwwroot
    networks:
      - massar_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5245/api/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # AI Worker (Node.js BullMQ)
  worker:
    image: massar_worker:local
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: massar_worker
    environment:
      REDIS_URL: "redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}"
      DB_CONNECTION_STRING: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-massar_platform}"
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-vertex}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      AI_TEMP_GCS_BUCKET: ${AI_TEMP_GCS_BUCKET:-}
      AI_TEMP_GCS_PREFIX: ${AI_TEMP_GCS_PREFIX:-ai-analysis}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gemini-2.5-flash}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-gemini-3-pro-image-preview}
      GEMINI_FALLBACK_API_KEY: ${GEMINI_FALLBACK_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-application-credentials.json
      API_CALLBACK_SECRET: ${API_CALLBACK_SECRET:?API_CALLBACK_SECRET is required}
      AI_CALLBACK_SECRET: ${AI_CALLBACK_SECRET:?AI_CALLBACK_SECRET is required}
      WORKER_ADMIN_TOKEN: ${WORKER_ADMIN_TOKEN:?WORKER_ADMIN_TOKEN is required}
      SUBTITLE_STORAGE_PATH: "/backend/src/NaderGorge.API/wwwroot/subtitles"
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_STRING_SESSION: ${TELEGRAM_STRING_SESSION:-}
      TELEGRAM_DOWNLOADER_BOT: ${TELEGRAM_DOWNLOADER_BOT:-utubebot}
      BACKEND_API_URL: "http://backend:5245"
      BUNNY_STREAM_LIBRARY_ID: ${BUNNY_STREAM_LIBRARY_ID:-}
      BUNNY_STREAM_API_KEY: ${BUNNY_STREAM_API_KEY:-}
      NODE_ENV: production
      TZ: Africa/Cairo
    ports:
      - "127.0.0.1:${MASSAR_WORKER_PORT:-3001}:3001"
    volumes:
      - massar_assets:/backend/src/NaderGorge.API/wwwroot
      - ./worker:/app/host-worker
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/google-application-credentials.json}:/run/secrets/google-application-credentials.json:ro
    networks:
      - massar_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3001/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Public Landing Surface (Next.js)
  landing:
    image: massar_frontend:local
    build: *frontend-build
    container_name: massar_landing
    hostname: landing
    environment:
      <<: *frontend-environment
      APP_SURFACE: landing
      NEXT_PUBLIC_APP_SURFACE: landing
    ports:
      - "127.0.0.1:${MASSAR_LANDING_PORT:-8738}:8738"
    networks:
      - massar_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8738 || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s

  # Student Surface (Next.js)
  student:
    image: massar_frontend:local
    container_name: massar_student
    hostname: student
    environment:
      <<: *frontend-environment
      APP_SURFACE: student
      NEXT_PUBLIC_APP_SURFACE: student
    ports:
      - "127.0.0.1:${MASSAR_STUDENT_PORT:-8739}:8738"
    networks:
      - massar_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8738 || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s

  # Admin Surface (Next.js)
  admin:
    image: massar_frontend:local
    container_name: massar_admin
    hostname: admin
    environment:
      <<: *frontend-environment
      APP_SURFACE: admin
      NEXT_PUBLIC_APP_SURFACE: admin
    ports:
      - "127.0.0.1:${MASSAR_ADMIN_PORT:-8740}:8738"
    networks:
      - massar_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8738 || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s

  # Teacher Surface (Next.js)
  teacher:
    image: massar_frontend:local
    container_name: massar_teacher
    hostname: teacher
    environment:
      <<: *frontend-environment
      APP_SURFACE: teacher
      NEXT_PUBLIC_APP_SURFACE: teacher
    ports:
      - "127.0.0.1:${MASSAR_TEACHER_PORT:-8741}:8738"
    networks:
      - massar_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8738 || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s

  # Assistant Surface (Next.js)
  assistant:
    image: massar_frontend:local
    container_name: massar_assistant
    hostname: assistant
    environment:
      <<: *frontend-environment
      APP_SURFACE: assistant
      NEXT_PUBLIC_APP_SURFACE: assistant
    ports:
      - "127.0.0.1:${MASSAR_ASSISTANT_PORT:-8742}:8738"
    networks:
      - massar_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8738 || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s


  # EF Core Migration Runner (on-demand, not started by make up)
  migrator:
    image: massar_migrator:local
    build:
      context: ./backend
      dockerfile: Dockerfile.migrator
    container_name: massar_migrator
    environment:
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-db};Database=${POSTGRES_DB:-massar_platform};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis: "${REDIS_HOST:-redis}:${REDIS_PORT:-6379},abortConnect=false"
      TZ: Africa/Cairo
    networks:
      - massar_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - migration

  # Nginx Reverse Proxy
  nginx:
    image: massar_nginx:local
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: massar_nginx
    ports:
      - "${MASSAR_NGINX_PORT:-80}:80"
    volumes:
      - massar_assets:/var/www/assets
    networks:
      - massar_net
    depends_on:
      landing:
        condition: service_healthy
      student:
        condition: service_healthy
      admin:
        condition: service_healthy
      teacher:
        condition: service_healthy
      assistant:
        condition: service_healthy
      backend:
        condition: service_healthy

    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 15s

networks:
  massar_net:
    name: massar_net
    driver: bridge

volumes:
  masar_pgdata:
    name: masar_pgdata
    external: true
  masar_redisdata:
    name: masar_redisdata
    external: true
  massar_assets:
    name: massar_assets
