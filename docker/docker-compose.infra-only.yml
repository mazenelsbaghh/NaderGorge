services:
  db:
    image: postgres:16-alpine
    container_name: nadergorge_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nadergorge}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nadergorge_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Telegram Local Bot API Server
  # Removes the 20MB file size limitation of the public api.telegram.org
  # Files up to 2GB can be served directly from Telegram's CDN via this proxy.
  # Requires TELEGRAM_API_ID and TELEGRAM_API_HASH from https://my.telegram.org
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: nadergorge_tgapi
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1          # enables local mode (no file size limit)
    ports:
      - "8081:8081"
    volumes:
      - tgdata:/var/lib/telegram-bot-api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  tgdata:
