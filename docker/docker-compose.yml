services:
  db:
    image: postgres:16.2-alpine
    container_name: massar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-massar_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - massar_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: massar_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - massar_redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Telegram Local Bot API Server
  # Removes the 20MB file size limitation of the public api.telegram.org
  # Files up to 2GB can be served directly from Telegram's CDN via this proxy.
  # Requires TELEGRAM_API_ID and TELEGRAM_API_HASH from https://my.telegram.org
  telegram-bot-api:
    image: aiogram/telegram-bot-api:2.1
    container_name: massar_tgapi
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1          # enables local mode (no file size limit)
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - massar_tgdata:/var/lib/telegram-bot-api
    restart: unless-stopped

volumes:
  massar_pgdata:
  massar_redisdata:
  massar_tgdata:
