# Nginx configuration for Massar Academy Platform subdomains

# Log configurations
error_log /var/log/nginx/error.log warn;
access_log /var/log/nginx/access.log;

# Default proxy settings
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Default Fallback Server (Catch-all)
server {
    listen 80 default_server;
    server_name _;

    # Fallback to landing page container
    location / {
        proxy_pass http://landing:8738;
    }
}

# 1. Public Landing Page
server {
    listen 80;
    server_name massaracademy.com www.massaracademy.com massarplatform.com www.massarplatform.com bsma-academy.com www.bsma-academy.com massar-academy.net www.massar-academy.net localhost;

    location / {
        proxy_pass http://landing:8738;
    }
}

# 2. Student Experience
server {
    listen 80;
    server_name app.massaracademy.com student.massaracademy.com app.massarplatform.com student.massarplatform.com app.bsma-academy.com student.bsma-academy.com app.massar-academy.net student.massar-academy.net;

    location / {
        proxy_pass http://student:8738;
    }
}

# 3. Administrative Panel (Super, Admin)
server {
    listen 80;
    server_name super.massaracademy.com admin.massaracademy.com super.massarplatform.com admin.massarplatform.com super.bsma-academy.com admin.bsma-academy.com admin.massar-academy.net super.massar-academy.net;

    location / {
        proxy_pass http://admin:8738;
    }
}

# 3a. Teacher Panel
server {
    listen 80;
    server_name teacher.massaracademy.com teacher.massarplatform.com teacher.bsma-academy.com teacher.massar-academy.net;

    location / {
        proxy_pass http://teacher:8738;
    }
}

# 3b. Assistant/Staff Panel
server {
    listen 80;
    server_name staff.massaracademy.com staff.massarplatform.com staff.bsma-academy.com staff.massar-academy.net;

    location / {
        proxy_pass http://assistant:8738;
    }
}


# 4. Backend API
server {
    listen 80;
    server_name api.massaracademy.com api.massarplatform.com api.bsma-academy.com api.massar-academy.net;

    location / {
        proxy_pass http://backend:5245;
    }
}

# 5. SignalR WebSockets
server {
    listen 80;
    server_name ws.massaracademy.com ws.massarplatform.com ws.bsma-academy.com ws.massar-academy.net;

    location / {
        proxy_pass http://backend:5245;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# 6. Static Assets Server
server {
    listen 80;
    server_name assets.massaracademy.com assets.massarplatform.com assets.bsma-academy.com assets.massar-academy.net;

    root /var/www/assets;

    location / {
        try_files $uri =404;
        # Enable CORS for frontend subdomains
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range";
        
        # Cache configuration for static resources
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
