# Nginx configuration for Massar Academy Platform subdomains

# Log configurations
error_log /var/log/nginx/error.log warn;
access_log /var/log/nginx/access.log;

# Default proxy settings
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Default Fallback Server (Catch-all)
server {
    listen 80 default_server;
    server_name _;

    # Fallback to landing page container
    location / {
        proxy_pass http://landing:8738;
    }
}

# Legacy redirects to consolidated massar-academy.net domain
server {
    listen 80;
    server_name massarplatform.com www.massarplatform.com bsma-academy.com www.bsma-academy.com;
    return 301 https://massar-academy.net$request_uri;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.(massarplatform\.com|bsma-academy\.com)$;
    return 301 https://$subdomain.massar-academy.net$request_uri;
}

# 1. Public Landing Page
server {
    listen 80;
    server_name massar-academy.net www.massar-academy.net localhost;

    location / {
        proxy_pass http://landing:8738;
    }
}

# 2. Student Experience
server {
    listen 80;
    server_name app.massar-academy.net student.massar-academy.net;

    location / {
        proxy_pass http://student:8738;
    }
}

# 3. Administrative Panel (Super, Admin)
server {
    listen 80;
    server_name admin.massar-academy.net super.massar-academy.net;

    location / {
        proxy_pass http://admin:8738;
    }
}

# 3a. Teacher Panel
server {
    listen 80;
    server_name teacher.massar-academy.net;

    location / {
        proxy_pass http://teacher:8738;
    }
}

# 3b. Assistant/Staff Panel
server {
    listen 80;
    server_name staff.massar-academy.net;

    location / {
        proxy_pass http://assistant:8738;
    }
}

# 4. Backend API
server {
    listen 80;
    server_name api.massar-academy.net;

    location / {
        proxy_pass http://backend:5245;
    }
}

# 5. SignalR WebSockets
server {
    listen 80;
    server_name ws.massar-academy.net;

    location / {
        proxy_pass http://backend:5245;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# 6. Static Assets Server
server {
    listen 80;
    server_name assets.massar-academy.net;

    root /var/www/assets;

    location / {
        try_files $uri =404;
        # Enable CORS for frontend subdomains
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range";
        
        # Cache configuration for static resources
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
