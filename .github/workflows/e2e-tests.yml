name: E2E Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nadergorge_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Run Backend Tests
      working-directory: backend
      env:
        ASPNETCORE_ENVIRONMENT: Development
        RUN_REDIS_INTEGRATION_TESTS: '1'
        TEST_REDIS_CONNECTION: localhost:6379,abortConnect=false
      run: dotnet test
        
    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Worker Dependencies
      working-directory: worker
      run: npm ci

    - name: Run Worker Tests
      working-directory: worker
      env:
        API_CALLBACK_SECRET: ci_api_callback_secret_value_1234567890
        WORKER_ADMIN_TOKEN: ci_worker_admin_token_value_1234567890
      run: npm test

    - name: Build and lint Frontend
      working-directory: frontend
      run: |
        npm run build
        npm run lint
        npm run check:platform-events
        node scripts/check-performance-budget.js
      
    - name: Install Playwright Browsers
      working-directory: frontend
      run: npx playwright install --with-deps chromium firefox webkit
      
    - name: Start Backend in E2E mode
      working-directory: backend/src/NaderGorge.API
      env:
        ASPNETCORE_ENVIRONMENT: E2e
        E2E_TEST_TOKEN: ci_e2e_test_token_value_1234567890
        API_CALLBACK_SECRET: ci_api_callback_secret_value_1234567890
        AI_CALLBACK_SECRET: ci_ai_callback_secret_value_1234567890
        ParentReports__SigningSecret: ci_parent_report_secret_value_1234567890
        ConnectionStrings__Redis: localhost:6379,abortConnect=false
      run: dotnet run &
      
    - name: Start Frontend
      working-directory: frontend
      run: npx next dev -p 3000 &
      
    - name: Wait for services to be ready
      run: |
        npx wait-on http://localhost:5245/api/health
        npx wait-on http://localhost:3000
        
    - name: Run Playwright tests
      working-directory: frontend
      run: npm run test:e2e
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
