name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Application
    runs-on: self-hosted

    steps:
    - name: Deploy locally on VPS
      run: |
        echo "🚀 Starting Local Deployment..."
        
        echo "📥 Fetching latest changes from GitHub using token..."
        git --git-dir=/var/www/nadergorge.git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mazenelsbaghh/NaderGorge.git main
        
        echo "🔄 Checking out latest files to production directory..."
        git --git-dir=/var/www/nadergorge.git --work-tree=/var/www/nadergorge checkout -f FETCH_HEAD
        
        cd /var/www/nadergorge
        
        echo "⚙️ Running database migrations..."
        docker compose --profile migration run --rm migrator

        echo "🔨 Building and restarting Docker containers..."
        docker compose up -d --build

        echo "🩺 Checking service health..."
        docker compose ps
        curl --fail --retry 10 --retry-delay 5 http://localhost:5245/api/health
        
        echo "🧹 Cleaning up old/unused Docker images and containers..."
        docker image prune -f
        
        echo "✅ Deployment completed successfully!"
